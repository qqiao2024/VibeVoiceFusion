<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- VibieVoice blue gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>

    <!-- Your Code box - Purple/Indigo -->
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>

    <!-- Library box - Green/Teal -->
    <linearGradient id="libraryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>

    <!-- Framework box - Orange/Amber -->
    <linearGradient id="frameworkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGradient)"/>

  <!-- Decorative elements (subtle geometric pattern) -->
  <g opacity="0.1">
    <rect x="680" y="20" width="40" height="40" rx="8" fill="#ffffff" transform="rotate(15 700 40)"/>
    <rect x="720" y="50" width="35" height="35" rx="6" fill="#ffffff" transform="rotate(30 737 67)"/>
    <rect x="700" y="90" width="30" height="30" rx="5" fill="#ffffff" transform="rotate(-10 715 105)"/>
    <rect x="750" y="30" width="25" height="25" rx="4" fill="#ffffff" transform="rotate(45 762 42)"/>
  </g>

  <!-- "Your Code" box (top center) - Purple/Indigo -->
  <rect x="300" y="80" width="200" height="60" rx="12" fill="url(#codeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="400" y="118" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#312e81" text-anchor="middle">Your Code</text>

  <!-- "Library" box (bottom left) - Green/Teal -->
  <rect x="100" y="300" width="180" height="60" rx="12" fill="url(#libraryGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="190" y="338" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#065f46" text-anchor="middle">Library</text>

  <!-- "Framework" box (bottom right) - Orange/Amber -->
  <rect x="520" y="300" width="180" height="60" rx="12" fill="url(#frameworkGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="610" y="338" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#78350f" text-anchor="middle">Framework</text>

  <!-- Arrow: Your Code -> Library (left side) -->
  <line x1="340" y1="140" x2="210" y2="295" stroke="#ffffff" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Label: "You call library" -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="20" font-style="italic" fill="#ffffff" text-anchor="middle">You call library</text>

  <!-- Arrow: Framework -> Your Code (right side) -->
  <line x1="590" y1="295" x2="460" y2="145" stroke="#ffffff" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Label: "Framework calls you" -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="20" font-style="italic" fill="#ffffff" text-anchor="middle">Framework calls you</text>

  <!-- Arrow: Framework -> Library (bottom) -->
  <line x1="515" y1="330" x2="285" y2="330" stroke="#ffffff" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Label: "Contains" -->
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="20" font-style="italic" fill="#ffffff" text-anchor="middle">Contains</text>

  <!-- Title: "Framework vs. Library" -->
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Framework vs. Library</text>
</svg>
