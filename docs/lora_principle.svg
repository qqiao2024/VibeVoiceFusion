<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Gradient for frozen weights -->
    <linearGradient id="frozenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for trainable weights -->
    <linearGradient id="trainableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>

    <!-- Plus marker -->
    <marker id="plusmarker" markerWidth="20" markerHeight="20" refX="10" refY="10" orient="auto">
      <circle cx="10" cy="10" r="8" fill="white" stroke="#64748b" stroke-width="1.5"/>
      <text x="10" y="14" text-anchor="middle" font-size="14" font-weight="bold" fill="#64748b">+</text>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e293b">LoRA: Low-Rank Adaptation</text>
  <text x="450" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Efficient Fine-Tuning by Decomposing Weight Updates</text>

  <!-- Left side: Standard Fine-tuning -->
  <g transform="translate(80, 120)">
    <text x="100" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#475569">Standard Fine-tuning</text>

    <!-- Input vector x -->
    <rect x="0" y="40" width="30" height="120" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="15" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#475569">x</text>
    <text x="15" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">d</text>

    <!-- Arrow -->
    <line x1="40" y1="100" x2="65" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Weight matrix W + ΔW -->
    <rect x="75" y="30" width="100" height="140" rx="6" fill="url(#trainableGrad)" opacity="0.9"/>
    <text x="125" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">W + ΔW</text>
    <text x="125" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">(d × k)</text>
    <text x="125" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">All parameters</text>
    <text x="125" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">trainable</text>

    <!-- Arrow -->
    <line x1="185" y1="100" x2="210" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Output vector h -->
    <rect x="220" y="50" width="30" height="100" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="235" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#475569">h</text>
    <text x="235" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">k</text>

    <!-- Parameters count -->
    <rect x="50" y="230" width="150" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="125" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#dc2626">d × k parameters</text>
  </g>

  <!-- Right side: LoRA Fine-tuning -->
  <g transform="translate(480, 120)">
    <text x="180" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#475569">LoRA Fine-tuning</text>

    <!-- Input vector x -->
    <rect x="0" y="90" width="30" height="120" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="15" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#475569">x</text>
    <text x="15" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">d</text>

    <!-- Split arrows -->
    <path d="M 40 150 L 60 150 L 60 80 L 85 80" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 40 150 L 60 150 L 60 220 L 85 220" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

    <!-- Frozen Weight matrix W (top path) -->
    <rect x="95" y="30" width="100" height="100" rx="6" fill="url(#frozenGrad)"/>
    <text x="145" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">W</text>
    <text x="145" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">(d × k)</text>

    <!-- Frozen icon -->
    <g transform="translate(170, 35)">
      <circle cx="10" cy="10" r="10" fill="white" opacity="0.9"/>
      <text x="10" y="15" text-anchor="middle" font-size="14">🔒</text>
    </g>
    <text x="145" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">Frozen</text>

    <!-- LoRA path: Matrix A -->
    <rect x="95" y="175" width="50" height="90" rx="4" fill="url(#trainableGrad)"/>
    <text x="120" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">A</text>
    <text x="120" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">(d × r)</text>

    <!-- Arrow between A and B -->
    <line x1="155" y1="220" x2="175" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- LoRA path: Matrix B -->
    <rect x="185" y="190" width="90" height="60" rx="4" fill="url(#trainableGrad)"/>
    <text x="230" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">B</text>
    <text x="230" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">(r × k)</text>

    <!-- Trainable label for LoRA -->
    <text x="190" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">Trainable</text>

    <!-- Arrow from W -->
    <line x1="205" y1="80" x2="280" y2="80" stroke="#64748b" stroke-width="2"/>
    <line x1="280" y1="80" x2="280" y2="130" stroke="#64748b" stroke-width="2"/>

    <!-- Arrow from B -->
    <line x1="285" y1="220" x2="310" y2="220" stroke="#64748b" stroke-width="2"/>
    <line x1="310" y1="220" x2="310" y2="170" stroke="#64748b" stroke-width="2"/>

    <!-- Plus circle -->
    <circle cx="295" cy="150" r="15" fill="white" stroke="#64748b" stroke-width="2"/>
    <text x="295" y="156" text-anchor="middle" font-size="20" font-weight="bold" fill="#64748b">+</text>

    <!-- Merge arrows to plus -->
    <line x1="280" y1="135" x2="283" y2="140" stroke="#64748b" stroke-width="2"/>
    <line x1="310" y1="165" x2="307" y2="160" stroke="#64748b" stroke-width="2"/>

    <!-- Arrow to output -->
    <line x1="315" y1="150" x2="345" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Output vector h -->
    <rect x="355" y="100" width="30" height="100" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="370" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#475569">h</text>
    <text x="370" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">k</text>

    <!-- Parameters count -->
    <rect x="130" y="295" width="150" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="205" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#16a34a">r × (d + k) params</text>
  </g>

  <!-- Equation section -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="800" height="80" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>

    <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155">Key Insight</text>

    <text x="400" y="60" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#475569">
      h = Wx + BAx = (W + BA)x     where r ≪ min(d, k)
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 520)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569">Legend:</text>

    <!-- Frozen -->
    <rect x="80" y="-15" width="20" height="20" rx="3" fill="url(#frozenGrad)"/>
    <text x="110" y="0" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Frozen (pre-trained weights)</text>

    <!-- Trainable -->
    <rect x="320" y="-15" width="20" height="20" rx="3" fill="url(#trainableGrad)"/>
    <text x="350" y="0" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Trainable (LoRA adapters)</text>

    <!-- Rank info -->
    <text x="570" y="0" font-family="Arial, sans-serif" font-size="13" fill="#64748b">r = LoRA rank (typically 4-64)</text>
  </g>

  <!-- Benefits box -->
  <g transform="translate(50, 550)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569">Benefits:</text>
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="13" fill="#64748b">
      • 10-100x fewer trainable parameters  • Lower memory usage  • Faster training  • Multiple adapters switchable at inference
    </text>
  </g>
</svg>
